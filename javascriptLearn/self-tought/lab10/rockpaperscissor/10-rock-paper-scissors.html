<!DOCTYPE html>
<html>
    <head>
        <title>Rock Paper Scissors</title>
        <link rel = "stylesheet" href = "style.css">
    </head>
    <body>
        <p class = "title">Rock Paper Scissor</p>
        <button onclick = "
            playGame('Rock');
        " class = "move-icon">✊</button>
        
        <button onclick = "
            playGame('Paper');
        " class = "move-icon">🖐</button>
        
        <button onclick = "
            playGame('Scissors');
        " class = "move-icon"
        >✌️</button>
        
        <p class = "js-result result"></p>
        <p class = "js-moves"></p>
        <p class = "js-score"></p>

        <button onclick = "
            score.wins = 0;
            score.losses = 0;
            score.ties = 0;
            localStorage.removeItem('score');
            updateScoreElement();
        ">Restart Score</button>

        <script src = "script.js"></script>
    </body>
</html>
